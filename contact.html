    <h2>Contact Me</h2>
    <div class="container mt-4">

        <h1 class="display-4 mb-4">Contact</h1>

        <form class="p-4 bg-light rounded shadow">

            <fieldset>

                <legend class="mb-3">Registration Form</legend>

                <div class="mb-3">
                    <label class="form-label">Name:</label>
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email:</label>
                    <input type="email" class="form-control" placeholder="Email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password:</label>
                    <input type="password" class="form-control" placeholder="Password">
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender:</label><br>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="g" value="m">
                        <label class="form-check-label">Male</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="g" value="f">
                        <label class="form-check-label">Female</label>
                    </div>

                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label">
                        Subscribe to newsletter
                    </label>
                </div>

                <input type="submit" class="btn btn-primary" value="Submit">

            </fieldset>

        </form>

    </div>


    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 My Portfolio</p>
    </footer>
